<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MestreXit | Sensibilidade + Admin (Firebase)</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body, html {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Poppins', sans-serif;
    }

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 0;
    }

    .key-screen {
      position: relative;
      z-index: 20;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .key-card {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 40px 30px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 255, 255, 0.1);
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .key-card h1 {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #FFFFFF, #AAAAAA);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.2s;
    }
    .key-card h1:active { transform: scale(0.98);}

    .sub {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 30px;
      border-bottom: 1px dashed rgba(255,255,255,0.3);
      display: inline-block;
      padding-bottom: 6px;
    }

    .key-input-group {
      margin: 25px 0;
      text-align: left;
    }
    .key-input-group label {
      font-size: 14px;
      color: #ddd;
      display: block;
      margin-bottom: 8px;
    }
    .key-input-group input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(20, 20, 30, 0.9);
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      border-radius: 50px;
      font-size: 16px;
      color: white;
      font-family: monospace;
      transition: all 0.3s;
      outline: none;
    }
    .key-input-group input:focus {
      border-color: #ffffff;
      box-shadow: 0 0 12px rgba(255,255,255,0.5);
    }
    .btn-key {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 2px solid white;
      color: white;
      font-size: 18px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-key:hover {
      background: white;
      color: black;
      box-shadow: 0 0 15px white;
    }
    .error-message {
      color: #ff5e5e;
      font-size: 13px;
      margin-top: 12px;
      min-height: 35px;
    }

    .main-content {
      position: relative;
      z-index: 10;
      display: none;
      width: 100%;
      height: 100%;
    }
    .container {
      position: relative;
      background-color: rgba(0, 0, 0, 0.8);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid #ffffff50;
      box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.2);
      width: 90%;
      max-width: 400px;
      text-align: center;
      margin: auto;
      top: 50%;
      transform: translateY(-50%);
      color: white;
    }
    .menu-buttons { display: flex; justify-content: center; margin-bottom: 20px; gap: 10px; }
    .menu-buttons button {
      background-color: transparent; border: 2px solid white; color: white;
      font-size: 16px; padding: 10px 0; border-radius: 8px; cursor: pointer; flex: 1;
      transition: all 0.3s;
    }
    .menu-buttons button:hover, .menu-buttons button.active {
      background-color: white; color: black;
    }
    select, button.action {
      width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
      background-color: #111; color: white; border: 1px solid #ffffff50;
    }
    button.action {
      background-color: transparent; border: 2px solid white; font-weight: bold; cursor: pointer;
    }
    button.action:hover { background-color: white; color: black; }
    .resultado, .auxilios {
      background-color: #111; margin-top: 20px; padding: 15px; border: 1px solid #ffffff50;
      border-radius: 8px; display: none; text-align: left;
    }
    .auxilios label { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
    .auxilios input[type="checkbox"] { width: 18px; height: 18px; appearance: none; background-color: black; border: 2px solid white; border-radius: 4px; cursor: pointer; }
    .auxilios input[type="checkbox"]:checked { background-color: white; }
    .progress-bar { width: 100%; background-color: #333; border-radius: 10px; overflow: hidden; margin-top: 10px; display: none; }
    .progress-bar-inner { height: 10px; width: 0; background-color: #fff; transition: width 3s linear; }
    .injection-message { margin-top: 15px; color: white; font-weight: bold; display: none; text-align: center; }
    .creditos { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 14px; color: gray; z-index: 10; }
    .creditos a { color: white; text-decoration: none; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }
    .admin-icon {
      position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
      border-radius: 50px; padding: 10px 18px; cursor: pointer; z-index: 25;
      border: 1px solid white; color: white; font-weight: bold; font-size: 14px;
      transition: 0.2s; display: flex; align-items: center; gap: 8px;
    }
    .admin-icon:hover { background: white; color: black; }

    .modal-proibida {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95);
      backdrop-filter: blur(8px); z-index: 100; display: none; justify-content: center; align-items: center;
    }
    .modal-card {
      background: #0a0a0a; border: 1px solid #ffffff70; border-radius: 28px; width: 90%; max-width: 700px;
      max-height: 85vh; overflow-y: auto; padding: 25px; color: white; box-shadow: 0 0 30px rgba(255,255,255,0.2);
    }
    .modal-card h3 { font-size: 28px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
    .close-modal { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }
    .key-list { margin-top: 20px; max-height: 350px; overflow-y: auto; }
    .key-item {
      background: #111; margin: 8px 0; padding: 12px 15px; border-radius: 16px;
      display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #fff;
    }
    .key-code { font-family: monospace; font-weight: bold; letter-spacing: 1px; }
    .key-status { font-size: 12px; padding: 4px 10px; border-radius: 50px; background: #2c2c2c; }
    .status-active { color: #4cff4c; }
    .status-paused { color: #ffaa44; }
    .status-expired { color: #ff5e5e; }
    .key-actions button {
      background: transparent; border: 1px solid white; color: white; margin-left: 8px; padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: 0.2s;
    }
    .key-actions button:hover { background: white; color: black; }
    .delete-key-btn { border-color: #ff5555 !important; color: #ff8888 !important; }
    .delete-key-btn:hover { background: #ff5555 !important; color: black !important; border-color: #ff5555 !important; }
    .gerar-area {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .suffix-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: #1a1a1a;
      padding: 12px;
      border-radius: 60px;
      border: 1px solid #ffffff30;
    }
    .suffix-group label {
      font-size: 14px;
      font-weight: bold;
      background: #333;
      padding: 6px 12px;
      border-radius: 40px;
    }
    .suffix-group input {
      flex: 1;
      padding: 10px 15px;
      background: #000;
      border: 1px solid #fff;
      border-radius: 40px;
      color: white;
      font-family: monospace;
      font-size: 14px;
    }

    .duration-group {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      padding: 12px;
      border-radius: 60px;
      border: 1px solid #ffffff30;
      margin-bottom: 5px;
    }
    .duration-group label {
      font-size: 14px;
      background: #333;
      padding: 6px 12px;
      border-radius: 40px;
      white-space: nowrap;
    }
    .duration-group input {
      width: 70px;
      padding: 10px;
      background: #000;
      border: 1px solid #fff;
      border-radius: 40px;
      color: white;
      font-family: monospace;
      text-align: center;
    }
    .duration-group select {
      flex: 1;
      padding: 10px;
      background: #000;
      border: 1px solid #fff;
      border-radius: 40px;
      color: white;
      font-size: 14px;
    }

    .btn-gerar {
      background: white;
      color: black;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }
    .btn-gerar:hover { background: #ccc; }
    .admin-notice {
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
      text-align: center;
    }
    .preview-key {
      background: #000000aa;
      padding: 8px;
      border-radius: 30px;
      text-align: center;
      font-family: monospace;
      font-size: 13px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
<div id="particles-js"></div>

<!-- Tela de ativação principal -->
<div id="keyScreen" class="key-screen">
  <div class="key-card">
    <h1 id="mestreXitTitle">MestreXit</h1>

<!-- App principal (sensibilidade) -->
<div id="mainApp" class="main-content">

  <div class="creditos">Desenvolvido por <a href="https://www.instagram.com/real.adriel01?igsh=MWp5Z2NiNzZqbWZtYQ==" target="_blank"><i class="fab fa-instagram"></i> MestreXit</a></div>
</div>

<!-- Ícone de admin -->
<div id="adminIcon" class="admin-icon" style="display: none;">
  <i class="fas fa-shield-alt"></i> Área Proibida
</div>

<!-- Modal Área Proibida -->
<div id="modalProibida" class="modal-proibida">
  <div class="modal-card">
    <h3><span><i class="fas fa-skull"></i> Área Restrita</span> <button class="close-modal" id="closeModalBtn">&times;</button></h3>
    <div style="border-bottom:1px solid #333; margin: 10px 0 20px;"></div>
    <div id="adminKeysContainer"></div>
    <div class="gerar-area">
      <div class="suffix-group">
        <label><i class="fas fa-pen-alt"></i> Sufixo</label>
        <input type="text" id="customSuffix" placeholder="ex: 123, ABC, XT-99" autocomplete="off">
      </div>
      <div class="duration-group">
        <label><i class="fas fa-hourglass-half"></i> Duração</label>
        <input type="number" id="durationValue" min="0" value="0" step="1">
        <select id="durationUnit">
          <option value="permanent">Permanente</option>
          <option value="minutes">Minutos</option>
          <option value="hours">Horas</option>
          <option value="days">Dias</option>
          <option value="months">Meses</option>
          <option value="years">Anos</option>
        </select>
      </div>
      <button class="btn-gerar" id="gerarKeyBtn">+ Gerar Nova Key (MESTRESENSI-)</button>
      <div class="preview-key" id="previewKeyDisplay">🔑 MESTRESENSI-? </div>
    </div>
    <div class="admin-notice"><i class="fas fa-cloud-upload-alt"></i> Sincronizado via Firebase</div>
  </div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    query, 
    where, 
    getDocs, 
    addDoc, 
    updateDoc, 
    deleteDoc, 
    doc, 
    onSnapshot,
    serverTimestamp,
    Timestamp 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxZoiw8h9ZCGxF1XP871DFIQ2tX40RPkg",
    authDomain: "mestrexit-327fd.firebaseapp.com",
    projectId: "mestrexit-327fd",
    storageBucket: "mestrexit-327fd.firebasestorage.app",
    messagingSenderId: "352059845970",
    appId: "1:352059845970:web:45f33fcfb8595de7c6de8b",
    measurementId: "G-9PDKN5SZ0V"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const keysCollection = collection(db, "keys");

  const VALID_MASTER_KEY = "MESTREXIT-999";
  const SECRET_ADMIN_KEY = "07058377";
  const KEY_PREFIX = "MESTRESENSI-";
  let adminUnlocked = false;
  let unsubscribeKeys = null;

  // ========== FUNÇÕES DE TEMPO (incluindo minutos) ==========
  function parseDuration(value, unit) {
    if (unit === 'permanent' || value <= 0) return null;
    const num = parseInt(value) || 0;
    if (num <= 0) return null;
    let ms = 0;
    let label = '';
    switch (unit) {
      case 'minutes': ms = num * 60 * 1000; label = `${num} minuto${num>1?'s':''}`; break;
      case 'hours': ms = num * 60 * 60 * 1000; label = `${num} hora${num>1?'s':''}`; break;
      case 'days': ms = num * 24 * 60 * 60 * 1000; label = `${num} dia${num>1?'s':''}`; break;
      case 'months': ms = num * 30 * 24 * 60 * 60 * 1000; label = `${num} ${num>1?'meses':'mês'}`; break;
      case 'years': ms = num * 365 * 24 * 60 * 60 * 1000; label = `${num} ano${num>1?'s':''}`; break;
      default: return null;
    }
    return { ms, label };
  }

  function isKeyExpired(createdAt, expiresIn) {
    if (!createdAt || !expiresIn || expiresIn === 'permanent') return false;
    const parts = expiresIn.split(' ');
    if (parts.length < 2) return false;
    const value = parseInt(parts[0]);
    const unit = parts[1];
    const duration = parseDuration(value, unit);
    if (!duration) return false;
    const now = Timestamp.now();
    const createdAtMs = createdAt.toMillis();
    const expirationMs = createdAtMs + duration.ms;
    return now.toMillis() > expirationMs;
  }

  function formatExpiration(createdAt, expiresIn) {
    if (!createdAt) return 'Desconhecido';
    if (!expiresIn || expiresIn === 'permanent') return 'Permanente';
    try {
      const parts = expiresIn.split(' ');
      const value = parseInt(parts[0]);
      const unit = parts[1];
      const duration = parseDuration(value, unit);
      if (!duration) return expiresIn;
      const expirationDate = new Date(createdAt.toMillis() + duration.ms);
      return `Expira ${expirationDate.toLocaleDateString('pt-BR')} ${expirationDate.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
    } catch { return expiresIn; }
  }

  // ========== GERENCIAMENTO DE KEYS ==========
  async function isSuffixTaken(suffix) {
    const full = KEY_PREFIX + suffix;
    const q = query(keysCollection, where("keyString", "==", full));
    const snapshot = await getDocs(q);
    return !snapshot.empty;
  }

  async function generateNewKey(customSuffix = "") {
    let finalSuffix = customSuffix.trim();
    let finalKey = "";
    
    if (finalSuffix === "") {
      const allKeys = await getDocs(keysCollection);
      let maxNum = 0;
      allKeys.forEach(doc => {
        const keyStr = doc.data().keyString;
        if (keyStr && keyStr.startsWith(KEY_PREFIX)) {
          const suffixPart = keyStr.substring(KEY_PREFIX.length);
          const num = parseInt(suffixPart, 10);
          if (!isNaN(num) && num > maxNum) maxNum = num;
        }
      });
      let candidate = (maxNum + 1).toString();
      while (await isSuffixTaken(candidate)) {
        maxNum++;
        candidate = maxNum.toString();
      }
      finalKey = KEY_PREFIX + candidate;
    } else {
      if (await isSuffixTaken(finalSuffix)) {
        alert(`❌ O sufixo "${finalSuffix}" já existe! Escolha outro.`);
        return null;
      }
      finalKey = KEY_PREFIX + finalSuffix;
    }
    return finalKey;
  }

  async function addNewKey(customSuffix, durationValue, durationUnit) {
    const newKeyStr = await generateNewKey(customSuffix);
    if (!newKeyStr) return false;
    
    let expiresIn = 'permanent';
    if (durationUnit !== 'permanent' && durationValue > 0) {
      expiresIn = `${durationValue} ${durationUnit}`;
    }
    
    try {
      await addDoc(keysCollection, {
        keyString: newKeyStr,
        status: "active",
        createdAt: serverTimestamp(),
        expiresIn: expiresIn
      });
      return true;
    } catch (e) {
      alert("Erro ao gerar chave: " + e.message);
      return false;
    }
  }

  async function deleteKeyById(docId) {
    try {
      await deleteDoc(doc(db, "keys", docId));
    } catch (e) {
      alert("Erro ao excluir: " + e.message);
    }
  }

  async function toggleKeyStatus(docId, newStatus) {
    try {
      await updateDoc(doc(db, "keys", docId), { status: newStatus });
    } catch (e) {
      alert("Erro ao alterar status: " + e.message);
    }
  }

  function listenToKeys() {
    if (unsubscribeKeys) unsubscribeKeys();
    const container = document.getElementById('adminKeysContainer');
    if (!container) return;
    
    unsubscribeKeys = onSnapshot(keysCollection, (snapshot) => {
      if (snapshot.empty) {
        container.innerHTML = `<div style="text-align:center; padding:30px;">Nenhuma key gerada ainda.<br>Clique em "Gerar Nova Key".</div>`;
        return;
      }
      let html = `<div class="key-list">`;
      snapshot.forEach(doc => {
        const k = doc.data();
        const docId = doc.id;
        const isActive = k.status === 'active';
        const expired = (k.createdAt && k.expiresIn) ? isKeyExpired(k.createdAt, k.expiresIn) : false;
        const expInfo = formatExpiration(k.createdAt, k.expiresIn);
        let statusClass = '';
        let statusText = '';
        if (!isActive) {
          statusClass = 'status-paused';
          statusText = 'PAUSADA';
        } else if (expired) {
          statusClass = 'status-expired';
          statusText = 'EXPIRADA';
        } else {
          statusClass = 'status-active';
          statusText = 'ATIVA';
        }
        
        html += `
          <div class="key-item">
            <div>
              <div class="key-code">🔑 ${k.keyString}</div>
              <div class="key-status ${statusClass}">${statusText}</div>
              <div style="font-size: 11px; color: #aaa; margin-top: 5px;">${expInfo}</div>
            </div>
            <div class="key-actions">
              ${isActive && !expired ? 
                `<button class="pause-key" data-id="${docId}">⏸️ Pausar</button>` : 
                (isActive && expired ? '' : `<button class="reactivate-key" data-id="${docId}">▶️ Reativar</button>`)}
              <button class="delete-key-btn" data-id="${docId}"><i class="fas fa-trash-alt"></i> Excluir</button>
            </div>
          </div>
        `;
      });
      html += `</div>`;
      container.innerHTML = html;
      
      document.querySelectorAll('.pause-key').forEach(btn => {
        btn.addEventListener('click', () => toggleKeyStatus(btn.dataset.id, 'paused'));
      });
      document.querySelectorAll('.reactivate-key').forEach(btn => {
        btn.addEventListener('click', () => toggleKeyStatus(btn.dataset.id, 'active'));
      });
      document.querySelectorAll('.delete-key-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (confirm("Excluir permanentemente?")) {
            await deleteKeyById(btn.dataset.id);
          }
        });
      });
    });
  }

  // ========== VALIDAÇÃO ==========
  async function validateMain() {
    const input = document.getElementById('mainKeyInput').value.trim();
    const err = document.getElementById('mainKeyError');
    
    if (input === VALID_MASTER_KEY) {
      unlockApp();
      return;
    }
    
    try {
      const q = query(keysCollection, where("keyString", "==", input), where("status", "==", "active"));
      const snapshot = await getDocs(q);
      
      if (!snapshot.empty) {
        const docData = snapshot.docs[0].data();
        const createdAt = docData.createdAt;
        const expiresIn = docData.expiresIn;
        if (createdAt && expiresIn && isKeyExpired(createdAt, expiresIn)) {
          err.innerHTML = '<i class="fas fa-clock"></i> Chave expirada!';
          setTimeout(() => err.innerHTML = '', 2000);
          return;
        }
        unlockApp();
      } else {
        err.innerHTML = '<i class="fas fa-times-circle"></i> Chave inválida ou inativa!';
        setTimeout(() => err.innerHTML = '', 2000);
      }
    } catch (e) {
      err.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Erro de conexão com Firebase.';
      setTimeout(() => err.innerHTML = '', 3000);
      console.error(e);
    }
  }

    document.getElementById('btnSensi').classList.toggle('active', menu === 'sensi');
    document.getElementById('btnAuxilio').classList.toggle('active', menu === 'auxilio');
  };

  window.injetarAuxilio = function() {
    const bar = document.getElementById('progress-bar');
    const inner = document.getElementById('progress-bar-inner');
    const msg = document.getElementById('injection-message');
    bar.style.display = 'block';
    msg.style.display = 'none';
    let w = 0;
    const int = setInterval(() => { if(w>=100) { clearInterval(int); msg.style.display='block'; } else { w++; inner.style.width = w+'%'; } }, 30);
  };

  // Inicialização
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('validateMainBtn').addEventListener('click', validateMain);
    document.getElementById('mainKeyInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') validateMain(); });
    document.getElementById('adminIcon').addEventListener('click', showAdminModalWithValidation);
    document.getElementById('closeModalBtn').addEventListener('click', () => {
      document.getElementById('modalProibida').style.display = 'none';
    });
    
    let clickCount = 0, clickTimer;
    document.getElementById('mestreXitTitle').addEventListener('click', () => {
      clickCount++;
      if(clickTimer) clearTimeout(clickTimer);
      clickTimer = setTimeout(() => clickCount = 0, 600);
      if(clickCount === 3) { clickCount = 0; showAdminModalWithValidation(); }
    });
    
    const suffixInput = document.getElementById('customSuffix');
    const gerarBtn = document.getElementById('gerarKeyBtn');
    const previewSpan = document.getElementById('previewKeyDisplay');
    const durationValue = document.getElementById('durationValue');
    const durationUnit = document.getElementById('durationUnit');
    
    function updatePreview() {
      let suffix = suffixInput.value.trim();
      previewSpan.innerHTML = `🔑 Visualização: ${KEY_PREFIX}${suffix === "" ? "AUTOMÁTICO" : suffix}`;
    }
    suffixInput.addEventListener('input', updatePreview);
    durationUnit.addEventListener('change', () => {
      if (durationUnit.value === 'permanent') {
        durationValue.disabled = true;
        durationValue.value = 0;
      } else {
        durationValue.disabled = false;
        if (durationValue.value == 0) durationValue.value = 1;
      }
      updatePreview();
    });
    durationValue.addEventListener('input', updatePreview);
    
    gerarBtn.addEventListener('click', async () => {
      const suffix = suffixInput.value.trim();
      const val = parseInt(durationValue.value) || 0;
      const unit = durationUnit.value;
      if (unit !== 'permanent' && val <= 0) {
        alert("Defina um valor maior que zero para a duração.");
        return;
      }
      const success = await addNewKey(suffix, val, unit);
      if(success) {
        suffixInput.value = "";
        durationValue.value = 0;
        durationUnit.value = 'permanent';
        durationValue.disabled = true;
        updatePreview();
      }
    });
    
    listenToKeys();
    updatePreview();
    durationValue.disabled = true;

    });
